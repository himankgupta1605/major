<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login • Ration Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>

  *{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body{
  background:#2cc517;
  color:white;
}

/* Background */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* Layout */
.container{
  position:relative;
  z-index:10;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Card */
.card{
  width:100%;
  max-width:420px;
  padding:28px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* Title */
h2{
  font-size:24px;
  margin-bottom:8px;
}

.subtitle{
  font-size:14px;
  color:#aaa;
  margin-bottom:20px;
}

/* Face Preview */
.face-box{
  width:100%;
  height:180px;
  border-radius:14px;
  background:#0d0d0d;
  border:1px solid #222;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  margin-bottom:16px;
}

.face-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.placeholder{
  color:#666;
  font-size:14px;
}

/* Inputs */
.input-group{
  margin-bottom:14px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #222;
  background:#0d0d0d;
  color:white;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:#2563eb;
}

/* Video */
video{
  width:100%;
  border-radius:12px;
  margin-top:12px;
  border:1px solid #222;
}

/* Buttons */
button{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

/* Capture */
#captureBtn{
  margin-top:12px;
  background:#1f1f1f;
  color:white;
}

#captureBtn:hover{
  background:#2a2a2a;
}

/* Login */
#loginBtn{
  margin-top:14px;
  background:#2563eb;
  color:white;
}

#loginBtn:hover{
  background:#1d4ed8;
}

#loginBtn:disabled{
  background:#444;
  cursor:not-allowed;
}

/* Status */
#status{
  font-size:13px;
  margin-bottom:12px;
}

/* Error */
.error{
  background:#ff4d4d;
  padding:10px;
  border-radius:8px;
  margin-bottom:12px;
}

/* Hidden */
.hidden{
  display:none;
}

/* Mobile polish */
@media (max-width:480px){
  .card{
    padding:20px;
  }

  h2{
    font-size:20px;
  }
}

body{
  background: linear-gradient(135deg, #052e16, #064e3b, #022c22);
  background-size: 300% 300%;
  animation: gradientMove 10s ease infinite;
  color:white;
}

/* animated gradient */
@keyframes gradientMove {
  0%{ background-position: 0% 50%; }
  50%{ background-position: 100% 50%; }
  100%{ background-position: 0% 50%; }
}

/* glowing radial overlay */
body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(34,197,94,0.25), transparent 70%);
  top:-150px;
  left:-150px;
  animation:floatGlow 6s ease-in-out infinite;
  z-index:0;
}

@keyframes floatGlow{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(80px,60px); }
}

/* CARD ANIMATION */
.card{
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* INPUT FOCUS GLOW */
input:focus{
  outline:none;
  border-color:#22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.3);
}

/* BUTTON HOVER */
button{
  transition:all 0.2s ease;
}

button:hover{
  transform:translateY(-2px);
}

/* LOGIN BUTTON GRADIENT */
#loginBtn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

#loginBtn:hover{
  background:linear-gradient(135deg,#16a34a,#15803d);
}

/* CAPTURE BUTTON */
#captureBtn{
  background:#064e3b;
}

#captureBtn:hover{
  background:#065f46;
}

/* FACE SUCCESS ANIMATION */
.face-box.success{
  animation:successPulse 0.6s ease;
  border:1px solid #22c55e;
}

@keyframes successPulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
  100%{ transform:scale(1); }
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <div class="card">

    <h2>Secure Login</h2>
    <p class="subtitle">Verify your identity using Aadhaar + Face</p>

    <div id="status"></div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <!-- FACE PREVIEW -->
    <div class="face-box">
      <img id="preview" class="hidden">
      <span id="placeholder" class="placeholder">Face preview will appear here</span>
    </div>

    <form method="post">

      <div class="input-group">
        <input type="text" id="aadhaar" name="aadhaarNo"
          placeholder="Enter Aadhaar Number"
          maxlength="12" required>
      </div>

      <!-- Camera -->
      <div id="cameraSection" class="hidden">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <input type="hidden" name="face_image" id="face_image">

        <button type="button" id="captureBtn">Capture Face</button>
      </div>

      <button type="submit" id="loginBtn" disabled>Login</button>

    </form>

  </div>
</div>

<script>
const aadhaar = document.getElementById("aadhaar");
const cameraSection = document.getElementById("cameraSection");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");
const loginBtn = document.getElementById("loginBtn");
const faceInput = document.getElementById("face_image");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");
const status = document.getElementById("status");

let checking = false;

function setStatus(msg, color){
  status.textContent = msg;
  status.style.color = color;
}

function resetUI(){
  cameraSection.classList.add("hidden");
  loginBtn.disabled = true;
  faceInput.value = "";
  preview.classList.add("hidden");
  placeholder.style.display = "block";
}

aadhaar.addEventListener("input", () => {
  aadhaar.value = aadhaar.value.replace(/\D/g,'').slice(0,12);
  resetUI();

  if(aadhaar.value.length !== 12) return;
  if(checking) return;

  checking = true;
  setStatus("Checking Aadhaar...", "#aaa");

  fetch(`/check_user/${aadhaar.value}`)
    .then(res => res.json())
    .then(data => {

      checking = false;

      if(!data.valid){
        setStatus("Invalid Aadhaar ❌", "red");
        return;
      }

      if(!data.exists){
        setStatus("Redirecting to register...", "orange");
        setTimeout(()=>{
          window.location.href = `/register?aadhaarNo=${aadhaar.value}`;
        },800);
        return;
      }

      setStatus("User found. Capture face", "#22c55e");
      cameraSection.classList.remove("hidden");

      if(!video.srcObject){
        navigator.mediaDevices.getUserMedia({video:true})
          .then(stream => video.srcObject = stream)
          .catch(()=> setStatus("Camera denied ❌", "red"));
      }
    })
    .catch(()=>{
      checking = false;
      setStatus("Server error ❌", "red");
    });
});

captureBtn.onclick = () => {
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);
  const data = canvas.toDataURL("image/jpeg");

  setStatus("Checking face...", "#aaa");

  fetch("/check_face", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ image: data })
  })
  .then(res => res.json())
  .then(result => {

    if (!result.ok) {
      setStatus(result.msg || "Face not visible ❌", "red");
      return;
    }

    // ✅ Update UI
    faceInput.value = data;
    preview.src = data;
    preview.classList.remove("hidden");
    placeholder.style.display = "none";

    // ✅ Safer element reference
    const faceBox = document.querySelector(".face-box");
    if (faceBox) {
      faceBox.classList.add("success");

      setTimeout(() => {
        faceBox.classList.remove("success");
      }, 600);
    }

    setStatus("Face verified ✅", "#22c55e");
    loginBtn.disabled = false;
  })
  .catch(() => setStatus("Face check failed ❌", "red"));
};

</script>

</body>
</html>
