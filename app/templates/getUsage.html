{% extends 'includes/layout.html' %}
{% block body %}

<style>
body{
  background:#021c14;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* LAYOUT */
.dashboard{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  color:#ccc;
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover,
.sidebar .active{
  background:#22c55e;
  color:white;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:30px;
  width:100%;
}

/* CARD */
.card{
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:25px;
  backdrop-filter:blur(10px);
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* HEADER */
.header{
  margin-bottom:20px;
}

.header h2{
  margin-bottom:5px;
}

.header p{
  color:#aaa;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #333;
  text-align:center;
}

th{
  color:#aaa;
  font-weight:500;
}

/* ROW HOVER */
tbody tr:hover{
  background:rgba(255,255,255,0.05);
}

/* EMPTY STATE */
.empty{
  text-align:center;
  color:#777;
  padding:20px;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .content{margin-left:0;}
}
</style>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/stock">Stock</a>
    <a href="/profile">Profile</a>
    <a class="active" href="/getUsage">Usage</a>
    <a href="/logout" style="color:red;">Logout</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="card">

      <div class="header">
        <h2>Usage Details</h2>
        <p>User: {{ name }}</p>
      </div>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Rice</th>
            <th>Wheat</th>
            <th>Coarse</th>
          </tr>
        </thead>

        <tbody id="tbody">
          <!-- JS FILLED -->
        </tbody>
      </table>

      <div id="emptyState" class="empty" style="display:none;">
        No usage records found
      </div>

    </div>

  </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

<script>
var beneficiary = '0x2Fb5450D46267983331b42e49430bBF7474dB6d8';
var distributor, contract;

function initWeb3() {
  if (typeof web3 !== 'undefined') {
    provider = web3.currentProvider;
    provider.enable();
    web3 = new Web3(provider);

    web3.eth.getCoinbase((error, account) => {
      distributor = account;
      initContract();
    });
  }
}

function initContract() {
  $.getJSON('/static/build/contracts/Commodity.json', function (output) {
    const abi = output.abi;
    contract = new web3.eth.Contract(abi, "0x88ba533e0b33f10b7153AF72479B1D095B89906a");

    contract.methods.entryCount(beneficiary).call((error, count) => {

      if (count == 0) {
        $("#emptyState").show();
        return;
      }

      for (let i = 0; i < count; i++) {
        contract.methods.beneficiaryData(beneficiary, i).call((error, res) => {

          const date = parseInt(res[2], 16);
          const bytes = hexToBytes(res[3].substring(2, 8));

          const formattedDate = date + "-" + bytes[0] + "-" + bytes[1] + "" + bytes[2];

          const row = `
            <tr>
              <td>${formattedDate}</td>
              <td>${res[4]} KG</td>
              <td>${res[5]} KG</td>
              <td>${res[6]} KG</td>
            </tr>
          `;

          $("#tbody").append(row);
        });
      }
    });
  });
}

function hexToBytes(hex) {
  let bytes = [];
  for (let c = 0; c < hex.length; c += 2) {
    bytes.push(parseInt(hex.substr(c, 2), 16));
  }
  return bytes;
}

$(document).ready(function () {
  initWeb3();
});
</script>

{% endblock %}
