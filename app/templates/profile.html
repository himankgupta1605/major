{% extends 'includes/layout.html' %}
{% block body %}

<style>
body{
  background:#021c14;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* LAYOUT */
.dashboard{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  color:#ccc;
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover,
.sidebar .active{
  background:#22c55e;
  color:white;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:30px;
  width:100%;
}

/* CARD */
.card{
  max-width:600px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:25px;
  backdrop-filter:blur(10px);
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

label{
  font-size:14px;
  color:#aaa;
  display:block;
  margin-bottom:5px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #222;
  background:#0d0d0d;
  color:white;
}

input:focus{
  outline:none;
  border-color:#22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.3);
}

/* READONLY */
input[disabled]{
  opacity:0.6;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  transition:0.3s;
}

.primary{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.secondary{
  background:#1f2937;
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
}

/* ALERT */
.alert{
  background:#16a34a;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .content{margin-left:0;}
}
</style>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/stock">Stock</a>
    <a class="active" href="/profile">Profile</a>
    <a href="/getUsage">Usage</a>
    <a href="/logout" style="color:red;">Logout</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="card">

      <h2 style="margin-bottom:15px;">Profile</h2>

      <!-- SUCCESS MESSAGE -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">

        <div class="form-group">
          <label>Aadhaar Number</label>
          <input type="text" value="{{ user.aadhaarNo }}" disabled>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" value="{{ user.name }}" required>
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" name="address" value="{{ user.address }}">
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" name="mobileNo" value="{{ user.mobileNo }}" maxlength="10" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <input type="text" value="{{ user.category }}" disabled>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Update</button>
          <a href="/" class="btn secondary">Back</a>
        </div>

      </form>

    </div>

  </div>

</div>

{% endblock %}
