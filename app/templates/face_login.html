<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login • Ration Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f5f6fa; --card:#fff; --text:#2f3640; --muted:#636e72;
      --brand:#0984e3; --brand-2:#74b9ff;
      --danger:#e84118; --ok:#22c55e;
      --shadow:0 8px 24px rgba(0,0,0,0.08); --border:#dfe6e9;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text); background:var(--bg);
      display:grid; place-items:center; padding:24px;
    }
    .card{
      width:100%; max-width:500px; background:var(--card);
      border-radius:14px; box-shadow:var(--shadow); padding:28px;
    }
    h1{margin:0 0 8px; font-size:1.5rem}
    p.sub{margin:0 0 24px; color:var(--muted)}
    label{display:block; font-weight:600; margin-bottom:8px}
    input[type="text"]{
      width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px;
      font:inherit; outline:none; transition:border-color .15s ease;
    }
    input[type="text"]:focus{border-color:var(--brand)}
    video, canvas {
      width: 100%;
      border-radius: 12px;
      margin: 12px 0;
      border: 2px solid #e5e7eb;
    }
    .flash{
      margin:0 0 12px; padding:12px; border-radius:10px; font-size:.95rem;
    }
    .flash.success{background:#e6ffed; color:#065f46}
    .flash.danger{background:#ffeaea; color:#7f1d1d}
    .flash.warning{background:#fff8e1; color:#7c5300}
    button{
      width:100%; padding:12px 16px; border:0; border-radius:10px; color:#fff;
      background:var(--brand); font-weight:700; cursor:pointer; margin-top:12px;
    }
    button:disabled{background:#9ca3af; cursor:not-allowed}
    .top{display:flex; align-items:center; gap:10px; margin-bottom:18px}
    .logo{width:36px; height:36px; border-radius:10px;
      background:linear-gradient(135deg,var(--brand),var(--brand-2)); box-shadow:var(--shadow)}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>Welcome back</h1>
        <p class="sub">Enter Aadhaar and capture your face to login</p>
      </div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login form -->
    <form method="post" action="{{ url_for('face_login') }}">
      <label for="aadhaarNo">Aadhaar Number</label>
      <input id="aadhaarNo" name="aadhaarNo" type="text" required />

      <!-- Webcam -->
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <input type="hidden" name="face_image" id="face_image" />

      <button type="button" id="captureBtn">📷 Capture Face</button>
      <button type="submit" id="loginBtn" disabled>🔐 Login</button>
    </form>
  </main>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const loginBtn = document.getElementById('loginBtn');
    const faceInput = document.getElementById('face_image');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err => { alert("Camera access denied: " + err); });

    captureBtn.addEventListener("click", () => {
      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      faceInput.value = canvas.toDataURL("image/jpeg");
      loginBtn.disabled = false;
      captureBtn.textContent = "✅ Captured";
    });
  </script>
</body>
</html>
