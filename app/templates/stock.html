{% extends 'includes/layout.html' %}
{% block body %}

<style>
body{
  background:#021c14;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* LAYOUT */
.dashboard{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  color:#ccc;
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover,
.sidebar .active{
  background:#22c55e;
  color:white;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:30px;
  width:100%;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* STOCK CARD */
.stock-card{
  text-align:center;
}

.stock-card h3{
  font-size:26px;
  margin-top:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #333;
  text-align:center;
}

/* INPUT */
input{
  width:80px;
  padding:6px;
  border-radius:8px;
  border:none;
  text-align:center;
}

/* BUTTON */
.btn{
  padding:12px;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* TOTAL */
.total{
  font-size:20px;
  margin-top:10px;
  text-align:right;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .content{margin-left:0;}
}
</style>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="/">Dashboard</a>
    <a class="active" href="/stock">Stock</a>
    <a href="/profile">Profile</a>
    <a href="/getUsage">Usage</a>
    <a href="/logout" style="color:red;">Logout</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <form method="POST">

      <!-- STOCK DISPLAY -->
      <div class="grid">

        <div class="card stock-card">
          <h4>Rice</h4>
          <h3 id="rice">0</h3>
          <span>KG Available</span>
        </div>

        <div class="card stock-card">
          <h4>Wheat</h4>
          <h3 id="wheat">0</h3>
          <span>KG Available</span>
        </div>

        <div class="card stock-card">
          <h4>Coarse</h4>
          <h3 id="coarse">0</h3>
          <span>KG Available</span>
        </div>

      </div>

      <!-- ORDER TABLE -->
      <div class="card">
        <h3>Select Quantity</h3>

        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Total</th>
            </tr>
          </thead>

          <tbody>

            <tr>
              <td>Rice</td>
              <td>₹3</td>
              <td><input type="number" id="riceQuantity" name="riceQuantity"></td>
              <td id="riceTotal">0</td>
            </tr>

            <tr>
              <td>Wheat</td>
              <td>₹2</td>
              <td><input type="number" id="wheatQuantity" name="wheatQuantity"></td>
              <td id="wheatTotal">0</td>
            </tr>

            <tr>
              <td>Coarse</td>
              <td>₹1</td>
              <td><input type="number" id="coarseQuantity" name="coarseQuantity"></td>
              <td id="coarseTotal">0</td>
            </tr>

          </tbody>
        </table>

        <div class="total">
          Grand Total: ₹ <span id="grandTotal">0</span>
        </div>

        <div style="margin-top:20px; display:flex; gap:10px;">
          <button class="btn" type="submit">Confirm</button>
          <button type="button" class="btn" id="otpBtn">Enter OTP</button>
        </div>

      </div>

    </form>

  </div>
</div>

<!-- MODAL -->
<div id="otpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
  <div style="background:#111; padding:20px; border-radius:12px; width:300px;">
    <h3>Enter OTP</h3>
    <input type="number" id="inputOtp" style="width:100%; margin-top:10px;">
    <button class="btn" id="submitOtp" style="margin-top:10px;">Submit</button>
  </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

<script>
/* CALCULATIONS */
function calc(){
  let r = (+$("#riceQuantity").val() || 0) * 3;
  let w = (+$("#wheatQuantity").val() || 0) * 2;
  let c = (+$("#coarseQuantity").val() || 0) * 1;

  $("#riceTotal").text(r);
  $("#wheatTotal").text(w);
  $("#coarseTotal").text(c);

  $("#grandTotal").text(r+w+c);
}

$(".quantity, input").on("input", calc);

/* OTP MODAL */
$("#otpBtn").click(()=>{
  $("#otpModal").css("display","flex");
});

/* OTP VERIFY */
$("#submitOtp").click(()=>{
  let otp = $("#inputOtp").val();

  $.get("/verifyOtp/"+otp,function(data){
    if(data === "True"){
      performTransaction();
    } else {
      alert(data);
    }
  });
});

/* WEB3 SAME AS BEFORE */
var contract, web3, distributor;
var beneficiary = '0x2Fb5450D46267983331b42e49430bBF7474dB6d8';

function initWeb3(){
  if(typeof web3 !== 'undefined'){
    provider = web3.currentProvider;
    provider.enable();
    web3 = new Web3(provider);

    web3.eth.getCoinbase((err, acc)=>{
      distributor = acc;
      initContract();
    });
  }
}

function initContract(){
  $.getJSON('/static/build/contracts/Commodity.json', function(output){
    abi = output.abi;
    contract = new web3.eth.Contract(abi,"0x88ba533e0b33f10b7153AF72479B1D095B89906a");
    getStatus();
  });
}

function getStatus(){
  contract.methods.distributors(distributor).call((e,res)=>{
    $("#rice").text(res[0]);
    $("#wheat").text(res[1]);
    $("#coarse").text(res[2]);
  });
}

function performTransaction(){
  let r = +$("#riceQuantity").val() || 0;
  let w = +$("#wheatQuantity").val() || 0;
  let c = +$("#coarseQuantity").val() || 0;

  contract.methods.sell(beneficiary,"0x06","0x011413",r,w,c)
    .send({from:distributor});
}

$(document).ready(()=>{
  initWeb3();
});
</script>

{% endblock %}
